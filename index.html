<!DOCTYPE html>

<body>
  <div id="root"></div>

  <script type="text/babel">

        sections: [

          },
          {

          },
          {
            heading: "Monthly Ad Calendar",
            items: [
              { label: "Week 1", detail: "Launch awareness Reel campaign. Test 3 creatives." },

              { label: "Profile Type", detail: "Look for: Indian women in fashion, lifestyle, mom bloggers, college/working women content. NOT fitness or travel." },

          {
            heading: "How to Find Them",

            ]

          {
            heading: "Collaboration Brief",

              { label: "Deliverables", detail: "1 Reel (30–60 sec) showing styling + 2 Stories with swipe-up/link. Posted within 7 days of receiving product." },

          }
        ]
      },
      reels: {
        icon: "🎬",
        title: "3 Reels Per Week",
        color: "#2D5F3F",
        sections: [
          {
            heading: "Weekly Reel Calendar",
            items: [
              { label: "Monday — Styling Reel", detail: "'3 Ways to Style This Kurti' — show the same kurti styled casually, for office, and for an outing. This format gets HUGE saves." },

            ]
          },
          {
            heading: "Reel Production Formula",
            items: [
              { label: "Duration", detail: "7–15 seconds performs best for reach. 30–60 seconds for depth (tutorials/styling). Never exceed 90 sec." },

              { label: "Consistency Rule", detail: "Posting 3x/week consistently beats 7x one week and 0x the next. The algorithm rewards consistency over volume." },
              { label: "After Posting", detail: "Spend 30 min engaging with comments + visit 10–15 similar accounts and genuinely comment. This signals the algorithm to push your post." }

        ]

              { label: "Board 4: Indian Summer Fashion 2025", detail: "Seasonal board updated quarterly. 'Summer 2025' in the title captures date-specific searches. Swap to 'Festive Season 2025' in September." },
              { label: "Board 5: Ethnic Wear Under ₹2000 India", detail: "Price-focused board. Massive search intent. Shoppers on a budget search this explicitly. Pin your products + complementary accessories." },
              { label: "Board 6: Kurti with Palazzo / Kurti with Jeans", detail: "These combination searches are extremely popular. Create a board for each styling combo that fits your products." },
              { label: "Board 7: Indian Wedding Guest Outfits", detail: "Wedding season is Oct–Feb. People search for outfit inspiration months in advance. Your long kurtis and printed pieces fit perfectly here." },
              { label: "Board 8: Cotton Fabric Care & Fashion Tips", detail: "Educational board. 'How to wash block print cotton', 'How to style a straight kurti'. Positions Bimba as an authority, not just a shop." }
            ]
          },
          {
            heading: "Pin Types & Weekly Volume",
            items: [
              { label: "Product Pins (5/week)", detail: "Direct product shots linked to product page. Use 1000×1500px (2:3 ratio) images. Title: 'Bloom V-Neck Cotton Kurti with Pockets | Bimba Studio'. Description: keyword-rich 2–3 sentences + price + CTA." },
              { label: "Styling / Outfit Pins (3/week)", detail: "Model photos or flat lays showing a complete outfit. Add text overlay: 'Monday Office Look 🌿' or '3 Ways to Style This Kurti'. Create on Canva — use 1080×1920px template." },
              { label: "Infographic / Value Pins (2/week)", detail: "'5 Ways to Style a Short Kurti for Work', 'How to Pick Your Kurti Size', 'Best Cotton Fabrics for Indian Summer'. These get 5x more saves than product pins and build long-term reach." },
              { label: "Idea Pins / Video Pins (1/week)", detail: "Repurpose your Instagram Reels here as video pins. Upload the same Reel directly to Pinterest. Pinterest heavily promotes video pins. Title it with keywords, not just your Reel caption." },
              { label: "Curated Repins (5–10/week)", detail: "Repin related Indian fashion content from other creators. Keeps your profile active daily. Spend 10 mins browsing and repinning. The algorithm rewards daily activity." }
            ]
          },
          {
            heading: "The Perfect Pin Formula",
            items: [
              { label: "Image Size & Quality", detail: "Always 2:3 ratio (1000×1500 or 1080×1620px). Vertical pins get 60% more engagement than square or horizontal. Use bright, well-lit photos. Canva Pro has ready-made Pinterest templates." },
              { label: "Pin Title (60 chars max)", detail: "Lead with the keyword: 'Cotton Short Kurti for Office Wear | Bimba Studio'. NOT 'Bloom Kurti – New Arrival'. Nobody searches 'Bloom Kurti'." },
              { label: "Pin Description (100–500 chars)", detail: "Write 2–3 sentences naturally using keywords. Example: 'Discover our premium floral cotton kurti perfect for Indian office wear. Breathable fabric, hidden pockets, and modern silhouette — all under ₹1500. Shop the full collection at bimbastudio.in 🌸'" },
              { label: "Alt Text", detail: "Pinterest uses alt text for search ranking. Write: 'Floral printed cotton short kurti for office wear India under 1500 — Bimba Studio'. Be descriptive and keyword-rich." },
              { label: "Destination URL", detail: "Always link to the specific PRODUCT PAGE, not the homepage. Pinterest users who click are in buying mode — send them directly to what they're looking at." }
            ]
          },
          {
            heading: "Pinterest SEO — Keywords to Weave In",
            items: [
              { label: "Tier 1 — High Volume (Use as board titles)", detail: "cotton kurti, kurti for women, ethnic wear India, Indian fashion, kurti design 2025, Indian kurta women" },
              { label: "Tier 2 — Medium Volume (Use in pin titles)", detail: "office kurti India, short kurti design, printed cotton kurti, summer kurti India, daily wear kurti, sleeveless kurti" },
              { label: "Tier 3 — Long Tail (Use in descriptions — these CONVERT)", detail: "cotton kurti for office wear India under 1500, modern Indian kurti design, best cotton kurti brand India, kurti with pockets women India" },
              { label: "Seasonal Keywords (Swap quarterly)", detail: "Q1 (Jan–Mar): 'summer kurti India 2025'. Q2 (Apr–Jun): 'monsoon ethnic wear'. Q3 (Jul–Sep): 'festive kurti 2025'. Q4 (Oct–Dec): 'wedding guest kurti', 'Diwali outfit Indian women'" },

            heading: "Monthly Content Calendar",
            items: [
              { label: "January–March: Summer Prep", detail: "Content: Light cotton kurtis, office wear, travel outfits. Keywords: summer kurti India, breathable cotton kurti. Push: short kurtis, sleeveless styles." },

              { label: "July–September: Festive Season Build-up", detail: "Content: Festive styling, gifting, traditional prints. Keywords: festive kurti 2025, Navratri outfit. Start Diwali content in August — people plan early." },

              { label: "Campaign Type", detail: "Start with 'Traffic' campaign objective. Target: Women 22–45, India + diaspora (US, UK, CA, AU), interests: Indian fashion, ethnic wear, kurtis." },
              { label: "Budget", detail: "₹200–400/day. Pinterest ads are cheaper than Meta in India's fashion category. Expect ₹5–15 cost per click vs ₹20–40 on Meta." },

    const weeklyPlan = [
      { day: "Mon", tasks: ["Film styling Reel", "Pin 3 products on Pinterest", "DM 5 influencers"] },
      { day: "Tue", tasks: ["Edit + post Reel", "Engage 30 mins on Instagram", "Check ad metrics"] },
      { day: "Wed", tasks: ["Film product spotlight Reel", "Post 2 Pinterest infographics", "Reply to all comments/DMs"] },
      { day: "Thu", tasks: ["Edit + post Reel", "Repin 5 posts on Pinterest", "Influencer follow-ups"] },
      { day: "Fri", tasks: ["Film relatable/hook Reel", "Pin 2 more products", "Review weekly ad spend"] },
      { day: "Sat", tasks: ["Post Friday Reel", "Post 3 Stories (polls/BTS)", "Plan next week's content"] },
      { day: "Sun", tasks: ["Rest 😊", "Light: save trending audios", "Batch-plan Reel scripts"] }
    ];

    function App() {

      const [openItems, setOpenItems] = useState({});

      const toggle = (key) => setOpenItems(prev => ({ ...prev, [key]: !prev[key] }));
      const tab = data[activeTab];

      const tabs = [
        { id: "performance", ...data.performance },
        { id: "influencer", ...data.influencer },
        { id: "reels", ...data.reels },
        { id: "pinterest", ...data.pinterest },
        { id: "weekly", icon: "📅", title: "Weekly Plan", color: "#444" }
      ];

      return (
        <div style={{ fontFamily: "Georgia, serif", background: "#FAF7F2", minHeight: "100vh", color: "#1A1A1A" }}>
          {/* Header */}

            </h1>

              Performance Ads · Influencers · Reels · Pinterest

          </div>

          {/* Tabs */}
          <div style={{
            display: "flex", overflowX: "auto", background: "#fff",
            borderBottom: "1px solid #E8E0D5", padding: "0 16px", scrollbarWidth: "none"

            {tabs.map(t => (
              <button key={t.id} onClick={() => setActiveTab(t.id)} style={{
                background: "none", border: "none", cursor: "pointer",
                padding: "16px 20px", whiteSpace: "nowrap", fontSize: 13,
                color: activeTab === t.id ? (t.color || "#C8452A") : "#888",
                borderBottom: activeTab === t.id ? `2px solid ${t.color || "#C8452A"}` : "2px solid transparent",
                fontWeight: activeTab === t.id ? 600 : 400, transition: "all 0.2s", fontFamily: "Georgia, serif"
              }}>
                {t.icon} {t.title}
              </button>
            ))}
          </div>

          {/* Content */}
          <div style={{ maxWidth: 760, margin: "0 auto", padding: "32px 16px 60px" }}>
            {activeTab !== "weekly" ? (
              <>
                <div style={{ marginBottom: 28 }}>
                  <h2 style={{ fontSize: 26, fontWeight: 400, margin: "0 0 6px", color: tab.color }}>
                    {tab.icon} {tab.title}
                  </h2>
                  <div style={{ height: 2, width: 48, background: tab.color, borderRadius: 2 }} />
                </div>

                {tab.sections.map((section, si) => (
                  <div key={si} style={{ marginBottom: 32 }}>
                    <h3 style={{
                      fontSize: 11, letterSpacing: 3, textTransform: "uppercase",
                      color: "#888", margin: "0 0 16px", fontWeight: 400
                    }}>{section.heading}</h3>
                    <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                      {section.items.map((item, ii) => {
                        const key = `${si}-${ii}`;
                        const isOpen = openItems[key];
                        return (
                          <div key={ii} style={{
                            background: "#fff",
                            border: `1px solid ${isOpen ? tab.color + "40" : "#E8E0D5"}`,
                            borderRadius: 10, overflow: "hidden",
                            transition: "border-color 0.2s",
                            boxShadow: isOpen ? `0 2px 16px ${tab.color}15` : "none"
                          }}>
                            <button onClick={() => toggle(key)} style={{
                              width: "100%", background: "none", border: "none", cursor: "pointer",
                              padding: "14px 18px", display: "flex", justifyContent: "space-between",
                              alignItems: "center", textAlign: "left"
                            }}>
                              <span style={{ fontSize: 14, fontWeight: 600, color: "#1A1A1A" }}>{item.label}</span>

                                fontSize: 18, color: tab.color, lineHeight: 1,
                                transform: isOpen ? "rotate(45deg)" : "rotate(0)",
                                transition: "transform 0.2s", flexShrink: 0, marginLeft: 12,

                              <div style={{
                                padding: "0 18px 16px", fontSize: 13.5, lineHeight: 1.7, color: "#444",

                                <p style={{ margin: "14px 0 0" }}>{item.detail}</p>
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                ))}
              </>
            ) : (
              <>
                <div style={{ marginBottom: 28 }}>
                  <h2 style={{ fontSize: 26, fontWeight: 400, margin: "0 0 6px", color: "#444" }}>📅 Weekly Action Plan</h2>
                  <p style={{ color: "#888", fontSize: 13, margin: "6px 0 0" }}>Your exact to-do list every week to run all 4 channels</p>
                  <div style={{ height: 2, width: 48, background: "#444", borderRadius: 2, marginTop: 10 }} />
                </div>

                <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                  {weeklyPlan.map((day, i) => (
                    <div key={i} style={{
                      background: "#fff", border: "1px solid #E8E0D5",
                      borderRadius: 12, padding: "16px 20px",
                      display: "flex", gap: 20, alignItems: "flex-start"
                    }}>
                      <div style={{
                        flexShrink: 0, width: 44, height: 44, borderRadius: 10,
                        background: i === 6 ? "#F0EDE8" : "linear-gradient(135deg, #C8452A, #8B5E3C)",
                        display: "flex", alignItems: "center", justifyContent: "center",
                        color: i === 6 ? "#888" : "#fff", fontWeight: 700, fontSize: 13
                      }}>{day.day}</div>
                      <div style={{ flex: 1 }}>
                        {day.tasks.map((task, ti) => (
                          <div key={ti} style={{
                            fontSize: 13.5, color: "#333", padding: "3px 0",
                            display: "flex", alignItems: "flex-start", gap: 8
                          }}>
                            <span style={{ color: "#C8452A", flexShrink: 0, marginTop: 2 }}>→</span>
                            {task}
                          </div>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>

                <div style={{ marginTop: 36 }}>
                  <h3 style={{ fontSize: 11, letterSpacing: 3, textTransform: "uppercase", color: "#888", margin: "0 0 16px", fontWeight: 400 }}>
                    Monthly Targets
                  </h3>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                    {[
                      { metric: "Instagram Followers", target: "+300–500/month", icon: "📸" },
                      { metric: "Reel Views", target: "10K+ per Reel avg", icon: "▶️" },
                      { metric: "Pinterest Monthly Views", target: "5K → 25K in 60 days", icon: "📌" },
                      { metric: "Website Traffic", target: "500+ sessions/week", icon: "🌐" },
                      { metric: "Influencer Collabs", target: "6–10 per month", icon: "🤝" },
                      { metric: "Ad ROAS", target: "2.5x minimum", icon: "💰" }
                    ].map((m, i) => (
                      <div key={i} style={{
                        background: "#fff", border: "1px solid #E8E0D5",
                        borderRadius: 12, padding: "16px",
                        display: "flex", flexDirection: "column", gap: 6
                      }}>
                        <span style={{ fontSize: 22 }}>{m.icon}</span>
                        <div style={{ fontSize: 12, color: "#888" }}>{m.metric}</div>
                        <div style={{ fontSize: 14, fontWeight: 700, color: "#C8452A" }}>{m.target}</div>
                      </div>
                    ))}
                  </div>
                </div>
              </>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
