<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bimba Studio — Growth Marketing System</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #FAF7F2; font-family: Georgia, serif; color: #1A1A1A; }
    button { font-family: Georgia, serif; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

const data = {
  performance: {
    icon: "📊",
    title: "Performance Marketing (₹10K Optimized)",
    color: "#C8452A",
    sections: [
      {
        heading: "Budget & Structure",
        items: [
          { label: "Monthly Budget", detail: "₹10,000 total. ₹9,000 ads + ₹1,000 creative testing buffer." },
          { label: "Campaign Type", detail: "Single Sales Campaign. Objective: Purchase. No awareness or traffic campaigns." },
          { label: "Ad Set 1 — Broad", detail: "Women 20–38, India. No interests. Broad targeting works better at low data stage." },
          { label: "Ad Set 2 — Retargeting", detail: "Website visitors + Instagram engagers (30 days). 30–40% daily spend." }
        ]
      },
      {
        heading: "Creative Testing Rules",
        items: [
          { label: "Test Volume", detail: "Minimum 4 new Reel creatives every month." },
          { label: "Hook Formula", detail: "Start with outcome: 'Office ready kurti under ₹1500' or 'Finally a kurti with pockets'." },
          { label: "Format", detail: "Vertical 9:16 Reels only. 7–15 seconds for cold traffic." },
          { label: "Pause Rule", detail: "If CTR below 1% after 3 days, pause creative." }
        ]
      },
      {
        heading: "Realistic KPIs",
        items: [
          { label: "CTR Target", detail: "1%–2%." },
          { label: "Cost Per Click", detail: "₹8–20 range." },
          { label: "Month 1 ROAS", detail: "1.5x–2x while testing." },
          { label: "Month 2+ ROAS", detail: "Scale only if consistently above 2x." },
          { label: "Primary Metric", detail: "Cost Per Purchase. Ignore vanity views." }
        ]
      }
    ]
  },

  influencer: {
    icon: "🤝",
    title: "Influencer System",
    color: "#8B5E3C",
    sections: [
      {
        heading: "Target Profile",
        items: [
          { label: "Follower Range", detail: "2K–15K nano influencers for best ROI." },
          { label: "Engagement Rule", detail: "Minimum 3% engagement rate." },
          { label: "Niche", detail: "Indian fashion, office wear, college styling. Avoid fitness/travel creators." }
        ]
      },
      {
        heading: "Execution Plan",
        items: [
          { label: "Outreach Volume", detail: "Send 20–30 DMs weekly." },
          { label: "Deliverables", detail: "1 Reel + 2 Stories. Posted within 7 days of receiving product." },
          { label: "Whitelisting", detail: "Always request ad usage rights for paid amplification." },
          { label: "Monthly Goal", detail: "6–8 influencer collaborations." }
        ]
      }
    ]
  },

  reels: {
    icon: "🎬",
    title: "3 Reels Per Week System",
    color: "#2D5F3F",
    sections: [
      {
        heading: "Weekly Structure",
        items: [
          { label: "Tuesday — Styling", detail: "3 ways to style one kurti." },
          { label: "Thursday — Product Focus", detail: "Fabric close-up, fit, pocket reveal." },
          { label: "Saturday — Relatable Hook", detail: "POV or problem solving angle." }
           { label: "Sunday — Relatable Hook", detail: "POV or problem solving angle." }
          
        ]
      },
      {
        heading: "Reel Formula",
        items: [
          { label: "Hook (First 2 sec)", detail: "Bold text outcome. No logo intro." },
          { label: "Duration", detail: "7–15 sec for ads. 20–30 sec for organic depth." },
          { label: "Text Overlay", detail: "Assume 60% watch on mute." },
          { label: "CTA", detail: "Always end with 'Shop link in bio' or 'Tap to shop'." }
        ]
      },
      {
        heading: "Volume Rule",
        items: [
          { label: "30 Day Target", detail: "Minimum 12 reels per month." },
          { label: "Creative Bank", detail: "Film 4–5 reels in one batch day." }
        ]
      }
    ]
  },

  pinterest: {
    icon: "📌",
    title: "Pinterest Organic Engine",
    color: "#9B2335",
    sections: [
      {
        heading: "First 60 Days",
        items: [
          { label: "No Ads", detail: "Do not run Pinterest ads until Meta is profitable." },
          { label: "Daily Pins", detail: "2 pins per day minimum." },
          { label: "Pin Types", detail: "Product pins + styling pins + 1 infographic weekly." }
        ]
      },
      {
        heading: "SEO Focus",
        items: [
          { label: "Board Titles", detail: "Use keywords like 'Office Kurtis India', 'Cotton Kurti Under 1500'." },
          { label: "Pin Titles", detail: "Lead with searchable phrase. Not product name first." },
          { label: "Destination URL", detail: "Always link to product page, not homepage." },
          { label: "Primary Metric", detail: "Outbound clicks to website." }
        ]
      }
    ]
  }
};

const weeklyPlan = [
  { day: "Mon", tasks: ["Film styling Reel", "Pin 2 products", "DM 5 influencers"] },
  { day: "Tue", tasks: ["Edit + post Reel", "Engage 30 mins", "Check ad metrics"] },
  { day: "Wed", tasks: ["Film product Reel", "Create 1 infographic pin"] },
  { day: "Thu", tasks: ["Edit + post Reel", "Influencer follow-ups"] },
  { day: "Fri", tasks: ["Film relatable Reel", "Pin 2 products", "Review ad performance"] },
  { day: "Sat", tasks: ["Post Reel", "Post Stories", "Plan next week"] },
  { day: "Sun", tasks: ["Light planning", "Save trending audios"] }
];

function App() {
  const [activeTab, setActiveTab] = useState("performance");
  const [openItems, setOpenItems] = useState({});
  const tab = data[activeTab];

  const toggle = (key) => setOpenItems(prev => ({ ...prev, [key]: !prev[key] }));

  const tabs = [
    { id: "performance", ...data.performance },
    { id: "influencer", ...data.influencer },
    { id: "reels", ...data.reels },
    { id: "pinterest", ...data.pinterest },
    { id: "weekly", icon: "📅", title: "Weekly Plan", color: "#444" }
  ];

  return (
    <div style={{ minHeight: "100vh" }}>
      <div style={{ background: "#1A1A1A", padding: "40px 20px", textAlign: "center", color: "#FAF7F2" }}>
        <h1 style={{ fontWeight: 400 }}>Bimba Studio Growth System</h1>
        <p style={{ opacity: 0.7, fontSize: 14 }}>Conversion First. Creative Driven. ₹10K Focused.</p>
      </div>

      <div style={{ display: "flex", overflowX: "auto", background: "#fff", borderBottom: "1px solid #eee" }}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => setActiveTab(t.id)} style={{
            padding: "14px 18px",
            border: "none",
            background: "none",
            cursor: "pointer",
            color: activeTab === t.id ? t.color : "#888",
            borderBottom: activeTab === t.id ? `2px solid ${t.color}` : "2px solid transparent"
          }}>
            {t.icon} {t.title}
          </button>
        ))}
      </div>

      <div style={{ maxWidth: 760, margin: "0 auto", padding: "30px 16px 60px" }}>
        {activeTab !== "weekly" ? (
          tab.sections.map((section, si) => (
            <div key={si} style={{ marginBottom: 30 }}>
              <h3 style={{ marginBottom: 12, color: tab.color }}>{section.heading}</h3>
              {section.items.map((item, ii) => {
                const key = `${si}-${ii}`;
                const isOpen = openItems[key];
                return (
                  <div key={ii} style={{ marginBottom: 8, border: "1px solid #eee", borderRadius: 8 }}>
                    <button onClick={() => toggle(key)} style={{
                      width: "100%",
                      padding: "12px 14px",
                      background: "none",
                      border: "none",
                      textAlign: "left",
                      cursor: "pointer",
                      fontWeight: 600
                    }}>
                      {item.label}
                    </button>
                    {isOpen && (
                      <div style={{ padding: "0 14px 12px", fontSize: 14, color: "#444" }}>
                        {item.detail}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          ))
        ) : (
          weeklyPlan.map((day, i) => (
            <div key={i} style={{ marginBottom: 14, padding: 14, background: "#fff", borderRadius: 8, border: "1px solid #eee" }}>
              <strong>{day.day}</strong>
              {day.tasks.map((task, ti) => (
                <div key={ti} style={{ fontSize: 14, marginTop: 4 }}>• {task}</div>
              ))}
            </div>
          ))
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
